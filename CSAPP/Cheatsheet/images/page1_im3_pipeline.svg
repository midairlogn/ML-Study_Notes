<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540" width="100%" height="100%">
  <defs>
    <style>
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 18px; fill: #333333; font-weight: 500; }
      .title-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 22px; fill: #1e3a8a; font-weight: bold; }
      .box-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 22px; fill: #111111; font-weight: 600; text-anchor: middle; }
      .italic-blue { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 19px; fill: #2563eb; font-style: italic; font-weight: 500; text-anchor: middle; text-decoration: underline; }
      
      .arrow { fill: none; stroke: #000000; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      
      .box-pc { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; }
      .box-reg { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; }
      .box-stage { fill: #e2f0d9; stroke: #70ad47; stroke-width: 3; }
      .box-mem { fill: #fce7f3; stroke: #f97316; stroke-width: 3; }
    </style>
    
    <marker id="arrowhead" markerWidth="7" markerHeight="7" refX="4" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#000000" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" />

  <g id="component-pc">
    <rect x="15" y="15" width="110" height="60" class="box-pc" rx="2" />
    <text x="70" y="52" class="box-text">PC</text>
  </g>

  <g id="component-registers">
    <rect x="15" y="230" width="110" height="295" class="box-reg" rx="2" />
    <text x="70" y="385" class="box-text">Registers</text>
  </g>

  <g id="component-memory">
    <rect x="615" y="15" width="190" height="510" class="box-mem" rx="2" />
    <text x="710" y="278" class="box-text" font-size="24px">Memory</text>
  </g>

  <g id="pipeline-stages">
    <rect x="210" y="15" width="240" height="50" class="box-stage" rx="2" />
    <text x="330" y="47" class="box-text">Fetch</text>

    <rect x="210" y="125" width="240" height="50" class="box-stage" rx="2" />
    <text x="330" y="157" class="box-text">Decode</text>

    <rect x="210" y="235" width="240" height="50" class="box-stage" rx="2" />
    <text x="330" y="267" class="box-text">Execute</text>

    <rect x="210" y="345" width="240" height="50" class="box-stage" rx="2" />
    <text x="330" y="377" class="box-text">Load/Store</text>

    <rect x="210" y="455" width="240" height="50" class="box-stage" rx="2" />
    <text x="330" y="487" class="box-text">Write Back</text>
  </g>

  <text x="210" y="100" class="italic-blue">Fetch &amp; decode</text>
  <text x="178" y="315" class="italic-blue">Arithmetic</text>
  <text x="175" y="335" class="italic-blue"> / logic</text>
  <text x="545" y="315" class="italic-blue">Memory access</text>

  <g id="arrows">
    <path d="M 125,45 L 202,45" class="arrow" marker-end="url(#arrowhead)" />

    <path d="M 450,30 L 607,30" class="arrow" marker-end="url(#arrowhead)" />
    <text x="515" y="22" class="label">PC</text>
    
    <path d="M 615,55 L 458,55" class="arrow" marker-end="url(#arrowhead)" />
    <text x="500" y="76" class="label">Instruction</text>

    <path d="M 330,65 L 330,117" class="arrow" marker-end="url(#arrowhead)" />

    <path d="M 320,175 L 320,227" class="arrow" marker-end="url(#arrowhead)" />
    <path d="M 370,175 L 370,337" class="arrow" marker-end="url(#arrowhead)" />

    <path d="M 125,250 L 202,250" class="arrow" marker-end="url(#arrowhead)" />
    <path d="M 125,270 L 202,270" class="arrow" marker-end="url(#arrowhead)" />
    <text x="135" y="242" class="label">Inputs</text>

    <path d="M 410,285 L 410,337" class="arrow" marker-end="url(#arrowhead)" />

    <path d="M 235,285 L 235,447" class="arrow" marker-end="url(#arrowhead)" />
    <text x="150" y="425" class="label">Output</text>

    <path d="M 450,360 L 607,360" class="arrow" marker-end="url(#arrowhead)" />
    <text x="470" y="352" class="label">Address</text>

    <path d="M 450,380 L 607,380" class="arrow" marker-end="url(#arrowhead)" />
    
    <path d="M 615,400 L 458,400" class="arrow" marker-end="url(#arrowhead)" />
    <text x="480" y="422" class="label">Data</text>

    <path d="M 410,395 L 410,447" class="arrow" marker-end="url(#arrowhead)" />

    <path d="M 210,480 L 133,480" class="arrow" marker-end="url(#arrowhead)" />
  </g>
</svg>
