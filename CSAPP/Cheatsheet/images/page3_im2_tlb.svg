<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="100%">
  <defs>
    <style>
      .bg-box { fill: #D9E1F2; stroke: #4472C4; stroke-width: 2; }
      .diamond { fill: #D9E1F2; stroke: #4472C4; stroke-width: 2; }
      .text-main { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 16px; fill: #000000; text-anchor: middle; font-weight: 500; }
      .text-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 18px; fill: #2F5597; text-anchor: middle; font-weight: bold; }
      .text-dest { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 18px; fill: #2F5597; text-anchor: middle; font-weight: bold; }
      .text-error { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 16px; fill: #C00000; text-anchor: middle; font-weight: bold; }
      .text-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 13px; fill: #000000; font-weight: normal; }
      .arrow { fill: none; stroke: #000000; stroke-width: 2; marker-end: url(#arrowhead); }
      .arrow-back { fill: none; stroke: #000000; stroke-width: 2; }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#000000" />
    </marker>
  </defs>

  <rect width="800" height="420" fill="white" />

  <text x="430" y="25" class="text-title">Virtual Address</text>
  <path d="M 430,32 L 430,48" class="arrow" />

  <rect x="345" y="50" width="170" height="40" class="bg-box" />
  <text x="430" y="75" class="text-main">TLB Lookup</text>
  <path d="M 430,90 L 430,108" class="arrow" />

  <polygon points="430,110 475,125 430,140 385,125" class="diamond" />
  <text x="430" y="130" class="text-main">Hit</text>

  <path d="M 385,125 L 290,125 L 290,148" class="arrow" />
  <text x="355" y="120" class="text-label" text-anchor="middle">No</text>

  <path d="M 475,125 L 570,125 L 570,148" class="arrow" />
  <text x="505" y="120" class="text-label" text-anchor="middle">Yes</text>

  <rect x="205" y="150" width="170" height="40" class="bg-box" />
  <text x="290" y="175" class="text-main">Page Table Walk</text>
  <path d="M 290,190 L 290,208" class="arrow" />

  <polygon points="290,210 335,225 290,240 245,225" class="diamond" />
  <text x="290" y="230" class="text-main">Found</text>

  <path d="M 245,225 L 115,225 L 115,288" class="arrow" />
  <text x="180" y="218" class="text-label" text-anchor="middle">Page In Memory</text>

  <rect x="50" y="290" width="130" height="50" class="bg-box" />
  <text x="115" y="320" class="text-main">Fill in TLB</text>

  <path d="M 290,240 L 290,288" class="arrow" />
  <text x="345" y="255" class="text-label" text-anchor="start">Page Not In</text>
  <text x="345" y="272" class="text-label" text-anchor="start">Memory</text>

  <text x="290" y="310" class="text-main">Page Fault</text>
  <text x="290" y="330" class="text-main">Demand Paging</text>
  <text x="290" y="350" class="text-main">Retry</text>

  <path d="M 335,225 L 430,225 L 430,288" class="arrow" />
  <text x="365" y="218" class="text-label" text-anchor="middle">No</text>
  <text x="430" y="310" class="text-error">Page Fault</text>
  <text x="430" y="330" class="text-error">Error</text>

  <rect x="495" y="150" width="170" height="40" class="bg-box" />
  <text x="580" y="175" class="text-main">Permission Check</text>
  <path d="M 580,190 L 580,208" class="arrow" />

  <polygon points="580,210 625,225 580,240 535,225" class="diamond" />
  <text x="580" y="230" class="text-main">OK</text>

  <path d="M 535,225 L 490,225 L 490,348" class="arrow" />
  <text x="510" y="218" class="text-label" text-anchor="middle">No</text>
  <text x="490" y="370" class="text-error">Permission Fault</text>

  <path d="M 625,225 L 670,225 L 670,348" class="arrow" />
  <text x="645" y="218" class="text-label" text-anchor="middle">Yes</text>
  <text x="670" y="370" class="text-dest">Physical Address</text>

  <path d="M 115,340 L 115,370 L 30,370 L 30,65 L 345,65" class="arrow-back" />
  
  <path d="M 290,360 L 290,385 L 15,385 L 15,55 L 345,55" class="arrow-back" />
</svg>
