<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 540" width="100%" height="100%">
  <defs>
    <style>
      .label-main { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 500; fill: #111111; text-anchor: middle; }
      .label-side { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; fill: #2B6CB0; text-anchor: middle; }
      .border-main { stroke: #2B6CB0; stroke-width: 3; fill: none; }
      .line-split { stroke: #2B6CB0; stroke-width: 3; }
    </style>
    
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
  </defs>

  <rect width="320" height="540" fill="#FFFFFF" />

  <rect x="20" y="20" width="220" height="100" fill="#8DB3E2" />
  
  <rect x="20" y="120" width="220" height="80" fill="#DCE6F1" />
  
  <rect x="20" y="200" width="220" height="80" fill="#FFFFFF" />
  
  <rect x="20" y="280" width="220" height="80" fill="#DCE6F1" />
  
  <rect x="20" y="360" width="220" height="30" fill="#FFFFFF" />
  
  <rect x="20" y="393" width="220" height="42" fill="#B9CDE5" />
  
  <rect x="20" y="435" width="220" height="42" fill="#DCE6F1" />
  
  <rect x="20" y="477" width="220" height="43" fill="#8DB3E2" />

  <rect x="20" y="20" width="220" height="500" class="border-main" />
  <line x1="20" y1="120" x2="240" y2="120" class="line-split" />
  <line x1="20" y1="200" x2="240" y2="200" class="line-split" />
  <line x1="20" y1="280" x2="240" y2="280" class="line-split" />
  <line x1="20" y1="360" x2="240" y2="360" class="line-split" />
  <line x1="20" y1="393" x2="240" y2="393" class="line-split" />
  <line x1="20" y1="435" x2="240" y2="435" class="line-split" />
  <line x1="20" y1="477" x2="240" y2="477" class="line-split" />

  <text x="130" y="77" class="label-main">OS/Kernel</text>
  <text x="130" y="167" class="label-main">Stack</text>
  <text x="130" y="327" class="label-main">Heap</text>
  <text x="130" y="420" class="label-main">Static Data</text>
  <text x="130" y="461" class="label-main">Text/Code</text>
  <text x="130" y="504" class="label-main">Reserved</text>

  <line x1="130" y1="215" x2="130" y2="255" stroke="#111111" stroke-width="3" marker-end="url(#arrow)" />

  <g transform="translate(285, 95) rotate(90)">
    <text x="0" y="0" class="label-side">High Address</text>
  </g>
  <g transform="translate(285, 435) rotate(90)">
    <text x="0" y="0" class="label-side">Low Address</text>
  </g>
</svg>
